name: CI - FastEstoque

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Back-end
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        working-directory: Back-end
        run: npm install

      - name: Rodar testes
        working-directory: Back-end
        run: npm test -- --run

  frontend:
    name: Front-end
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Instalar dependencias
        working-directory: Front-end/fast-estoque
        run: npm install

      - name: Rodar testes
        working-directory: Front-end/fast-estoque
        run: npm test -- --run